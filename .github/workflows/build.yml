name: Build

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="1.0.0"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish src/AutoStart.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.version }} -p:AssemblyVersion=${{ steps.version.outputs.version }} -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Zip EXE
        shell: pwsh
        run: Compress-Archive -Path src/bin/Release/net8.0-windows/win-x64/publish/AutoStart.exe -DestinationPath src/bin/Release/net8.0-windows/win-x64/publish/AutoStart.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoStart
          path: src/bin/Release/net8.0-windows/win-x64/publish/AutoStart.zip

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: src/bin/Release/net8.0-windows/win-x64/publish/AutoStart.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
