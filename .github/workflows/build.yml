name: Build

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish
        run: dotnet publish src/ExeCycler.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true

      # Her push'ta artifact olarak sakla (test icin)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExeCycler
          path: src/bin/Release/net8.0-windows/win-x64/publish/ExeCycler.exe

      # Sadece Release yayinlandiginda EXE'yi release'e yukle
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: src/bin/Release/net8.0-windows/win-x64/publish/ExeCycler.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
